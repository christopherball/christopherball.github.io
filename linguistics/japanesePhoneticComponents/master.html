<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Useful Kanji Phonetic Components</title>

        <style>
            :root {
                --viewport-height: 100vh;
                --bg: #0f1117;
                --cell: #1a1f2b;
                --border: #2a3245;
                --text-main: #e6e9ef;
                --text-sub: #9aa3b2;
                --page-padding: clamp(12px, 2vmin, 20px);
                --chrome-height: clamp(112px, 18vh, 148px);
                --toggle-bg: #161b26;
                --toggle-active: #e6e9ef;
                --toggle-active-text: #0f1117;
            }

            @supports (height: 100dvh) {
                :root {
                    --viewport-height: 100dvh;
                }
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
            }

            body {
                background: var(--bg);
                color: var(--text-main);
                min-height: var(--viewport-height);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: clamp(0.75rem, 2vmin, 1rem);
                padding: var(--page-padding);
                overflow: hidden;
            }

            .page-header {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.75rem;
                flex-shrink: 0;
            }

            h1 {
                font-weight: 500;
                letter-spacing: 0.04em;
                margin: 0;
                text-align: center;
            }

            .mode-toggle {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.35rem;
                padding: 0.3rem;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: var(--toggle-bg);
            }

            .mode-link {
                border-radius: 999px;
                padding: 0.48rem 0.95rem;
                color: var(--text-sub);
                text-decoration: none;
                font-size: 0.92rem;
                line-height: 1;
                white-space: nowrap;
                transition:
                    background-color 0.2s ease,
                    color 0.2s ease;
            }

            .mode-link:hover {
                color: var(--text-main);
            }

            .mode-link[aria-current="page"] {
                background: var(--toggle-active);
                color: var(--toggle-active-text);
                font-weight: 600;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                width: min(
                    calc(100vw - (var(--page-padding) * 2)),
                    calc((var(--viewport-height) - var(--chrome-height)) * 5 / 8)
                );
                aspect-ratio: 5 / 8;
            }

            .cell {
                position: relative;
                border: 1px solid var(--border);
                background: var(--cell);
                container-type: size;
            }

            .cell-body {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: clamp(2px, 4cqmin, 6px);
            }

            .symbol {
                font-size: clamp(16px, 46cqmin, 72px);
                text-align: center;
                white-space: nowrap;
                line-height: 0.92;
            }

            .reading {
                position: absolute;
                left: 50%;
                bottom: clamp(3px, 6cqmin, 8px);
                transform: translateX(-50%);
                font-size: clamp(7px, 16cqmin, 20px);
                letter-spacing: 0.08em;
                color: var(--text-sub);
                text-align: center;
                white-space: nowrap;
                line-height: 1.05;
            }

            .stroke {
                position: absolute;
                top: clamp(2px, 4cqmin, 6px);
                left: 50%;
                transform: translateX(-50%);
                min-height: clamp(8px, 10cqmin, 14px);
                font-size: clamp(8px, 10cqmin, 14px);
                color: var(--text-sub);
                line-height: 1;
                pointer-events: none;
            }

            @media (max-width: 600px) {
                h1 {
                    font-size: 1.2rem;
                }

                .mode-link {
                    font-size: 0.84rem;
                    padding: 0.42rem 0.78rem;
                }
            }
        </style>
    </head>

    <body>
        <div class="page-header">
            <h1>Useful Kanji Phonetic Components</h1>
            <nav class="mode-toggle" aria-label="View mode">
                <a class="mode-link" href="index.html">Flip</a>
                <a
                    class="mode-link"
                    href="master.html"
                    aria-current="page"
                    >Master</a
                >
            </nav>
        </div>

        <div class="grid" id="grid"></div>

        <script>
            const data = [
                { comp: "亡", read: "ボウ", stroke: 3 },
                { comp: "及", read: "キュウ" },
                { comp: "工", read: "コウ" },
                { comp: "干", read: "カン" },
                { comp: "中", read: "チュウ", stroke: 4 },
                { comp: "化", read: "カ" },
                { comp: "反", read: "ハン" },
                { comp: "付", read: "フ", stroke: 5 },
                { comp: "令", read: "レイ" },
                { comp: "包", read: "ホウ" },
                { comp: "半", read: "ハン" },
                { comp: "古", read: "コ" },
                { comp: "召", read: "ショウ" },
                { comp: "可", read: "カ" },
                { comp: "司", read: "シ" },
                { comp: "圣", read: "ケイ" },
                { comp: "旦", read: "タン" },
                { comp: "生", read: "セイ" },
                { comp: "申", read: "シン" },
                { comp: "皮", read: "ヒ" },
                { comp: "交", read: "コウ", stroke: 6 },
                { comp: "同", read: "ドウ" },
                { comp: "成", read: "セイ" },
                { comp: "旨", read: "シ" },
                { comp: "次", read: "シ" },
                { comp: "𢦏", read: "サイ" },
                { comp: "甫", read: "ホ", stroke: 7 },
                { comp: "肖", read: "ショウ" },
                { comp: "其", read: "キ", stroke: 8 },
                { comp: "奇", read: "キ" },
                { comp: "官", read: "カン" },
                { comp: "采", read: "サイ" },
                { comp: "青", read: "セイ" },
                { comp: "兪", read: "ユ", stroke: 9 },
                { comp: "禺", read: "グウ" },
                { comp: "冓", read: "コウ", stroke: 10 },
                { comp: "啇", read: "テキ", stroke: 11 },
                { comp: "麻", read: "マ" },
                { comp: "尞", read: "リョウ", stroke: 12 },
                { comp: "義", read: "ギ", stroke: 13 },
            ];

            const grid = document.getElementById("grid");

            data.forEach((item) => {
                const cell = document.createElement("div");
                cell.className = "cell";

                const body = document.createElement("div");
                body.className = "cell-body";

                const comp = document.createElement("div");
                comp.className = "symbol";
                comp.textContent = item.comp;

                const reading = document.createElement("div");
                reading.className = "reading";
                reading.textContent = item.read;

                const stroke = document.createElement("div");
                stroke.className = "stroke";
                stroke.textContent = item.stroke ?? "";

                body.appendChild(comp);
                cell.appendChild(body);
                cell.appendChild(reading);
                cell.appendChild(stroke);

                grid.appendChild(cell);
            });
        </script>
    </body>
</html>
